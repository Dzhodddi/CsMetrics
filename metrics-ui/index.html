<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Performance Analytics Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-root">

  <div id="loginPage" class="login-container">
    <form id="loginForm" class="login-form">
      <h2>Authorization</h2>
      <input type="text" id="username" placeholder="Login" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" id="loginBtn">Enter</button>
    </form>
  </div>

  <div id="dashboardPage" class="dashboard-container hidden">
    <header class="dashboard-header">
      <h1>Dashboard Engine</h1>
      <nav class="tab-navigation">
        <button onclick="switchTab('metricsTab')" class="nav-tab active">Metrics</button>
        <button onclick="switchTab('cardsTab')" class="nav-tab">Secure Cards</button>
        <button onclick="switchTab('usersTab')" id="tabUsers" class="nav-tab admin-only">Users</button>
      </nav>
      <button id="btnLogout" class="logout-btn">Logout</button>
    </header>

    <div id="errorMessage" class="error-message hidden"></div>
    <div id="loader" class="loader hidden">Downloading...</div>

    <div id="metricsTab" class="tab-content">
      <div class="action-bar">
        <div class="action-buttons">
          <button id="btnValidate" class="action-btn validate">Trigger Validate</button>
          <button id="btnLoad" class="action-btn load">Trigger Load Data</button>
        </div>
      </div>

      <div class="chart-wrapper">
        <canvas id="metricsChart"></canvas>
      </div>

      <div class="table-wrapper">
        <table class="metrics-table">
          <thead>
          <tr>
            <th>Env</th>
            <th>Host</th>
            <th>Type</th>
            <th>Executed Action / Route</th>
            <th>Latency</th>
            <th>Recorded At</th>
          </tr>
          </thead>
          <tbody id="metricsTableBody"></tbody>
        </table>
      </div>

      <div class="pagination-wrapper">
        <button id="btnBack">Back</button>
        <span id="pageInfo">Page 1 of 1</span>
        <button id="btnNext">Next</button>
      </div>
    </div>

    <div id="cardsTab" class="tab-content hidden">
      <div class="cards-grid-layout">
        <div class="card-form-panel">
          <h3>Add new card</h3>
          <form id="secureCardForm" class="vertical-form">
            <input type="text" id="cardTitle" placeholder="Name" required>
            <input type="text" id="cardHolder" placeholder="Owner" required>
            <input type="text" id="cardNumber" placeholder="Number" required>
            <input type="text" id="cardCvv" placeholder="CVV" maxlength="3" required>
            <button type="submit">Save</button>
          </form>
        </div>
        <div class="card-list-panel">
          <h3>Existing cards</h3>
          <div id="cardsContainer" class="cards-list"></div>

          <div class="pagination-wrapper" style="margin-top: 15px;">
            <button id="btnCardsBack">Back</button>
            <span id="cardsPageInfo">Page 1 of 1</span>
            <button id="btnCardsNext">Next</button>
          </div>
        </div>
      </div>
    </div>

    <div id="usersTab" class="tab-content hidden admin-only">
      <div class="users-management-panel">
        <div class="card-form-panel">
          <h3>Add new user</h3>
          <form id="createUserForm" class="vertical-form">
            <input type="text" id="newUsername" placeholder="Username" required>
            <input type="password" id="newPassword" placeholder="Password" required>
            <select id="newRole">
              <option value="ROLE_READER">ROLE_READER</option>
              <option value="ROLE_ADMIN">ROLE_ADMIN</option>
            </select>
            <button type="submit">Register</button>
          </form>
        </div>
        <div class="user-actions-panel">
          <div class="vertical-form" style="flex-direction:row; gap:10px;">
            <input type="text" id="actionUsername" placeholder="username" required>
            <button onclick="handleUserAdminAction('block', true)" style="background:#ff4d4d; color:white;">Block</button>
            <button onclick="handleUserAdminAction('block', false)" style="background:#4ecdc4; color:black;">Unblock</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
</body>
</html>
