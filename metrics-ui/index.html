<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Performance Dashboard</title>
  <style>
    /* Перенесені стилі з твого index.css */
    :root {
      --text-primary: #F5F7FA;
      --text-secondary: #A0A8B5;
      --bg-dark: #0F1720;
      --bg-gradient: linear-gradient(135deg, #0F1720 0%, #182635 100%);
      --panel-bg: #1B2430;
      --accent: #FF9A42;
      --accent-hover: #D97706;
      --accent-yellow: #FFD58A;
      --border-faint: #233646;
      --border-strong: #4B6A7D;
      --shadow: 0 8px 24px rgba(10, 15, 20, 0.8);
      --sans: system-ui, -apple-system, sans-serif;
    }

    body {
      margin: 0;
      font: 16px/145% var(--sans);
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    h1, h2 {
      color: var(--text-primary);
      font-weight: 600;
    }

    .app-root {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 5vh;
    }

    /* Стилі сторінки авторизації */
    .login-container {
      background: var(--panel-bg);
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: var(--shadow);
      width: 320px;
      border: 1px solid var(--border-faint);
      margin-top: 10vh;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .login-form h2 {
      margin-top: 0;
      text-align: center;
    }

    input {
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--border-faint);
      background: var(--bg-dark);
      color: var(--text-primary);
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--border-strong);
      box-shadow: 0 0 0 2px rgba(75, 106, 125, 0.3);
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 6px;
      background-color: var(--accent);
      color: var(--bg-dark);
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
    }

    button:hover {
      background-color: var(--accent-hover);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Стилі дашборду */
    .dashboard-container {
      width: 95%;
      max-width: 1100px;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .logout-btn {
      background-color: #ff4d4d;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    .logout-btn:hover {
      background-color: #cc0000;
      color: white;
      transform: none;
    }

    .action-btn.validate { background-color: var(--accent); color: var(--bg-dark); }
    .action-btn.load { background-color: var(--accent-yellow); color: var(--bg-dark); }

    .table-wrapper {
      background: var(--panel-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-faint);
    }

    .metrics-table {
      width: 100%;
      border-collapse: collapse;
    }

    .metrics-table th,
    .metrics-table td {
      padding: 16px 20px;
      text-align: left;
      border-bottom: 1px solid var(--border-faint);
    }

    .metrics-table th {
      background: rgba(35, 54, 70, 0.4);
      color: var(--text-secondary);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }

    .metrics-table tr:hover {
      background: rgba(35, 54, 70, 0.4);
    }

    .badge {
      padding: 5px 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .badge.cpu { background-color: var(--accent); color: var(--bg-dark); }
    .badge.latency { background-color: var(--accent-yellow); color: var(--bg-dark); }
    .status-active { color: var(--text-primary); font-weight: bold; }

    .loader { text-align: center; color: var(--text-secondary); padding: 2rem; font-style: italic; }
    .error-message { text-align: center; color: var(--bg-dark); background-color: var(--accent); padding: 1rem; border-radius: 6px; font-weight: bold; margin-bottom: 1rem; box-shadow: var(--shadow); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="app-root">

  <div id="loginPage" class="login-container">
    <form id="loginForm" class="login-form">
      <h2>Authorization</h2>
      <input type="text" id="username" placeholder="Login" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" id="loginBtn">Enter</button>
    </form>
  </div>

  <div id="dashboardPage" class="dashboard-container hidden">
    <header class="dashboard-header" style="display: flex; gap: 15px; align-items: center;">
      <h1>Server Performance Dashboard</h1>

      <div class="action-buttons" style="margin-left: auto; display: flex; gap: 10px;">
        <button id="btnValidate" class="action-btn validate" onclick="triggerAction('validate', 'btnValidate', 'Trigger Validate')">Trigger Validate</button>
        <button id="btnLoad" class="action-btn load" onclick="triggerAction('load-data', 'btnLoad', 'Trigger Load Data')">Trigger Load Data</button>
      </div>

      <button onclick="handleLogout()" class="logout-btn">Logout</button>
    </header>

    <div id="errorMessage" class="error-message hidden"></div>
    <div id="loader" class="loader hidden">Loading metrics...</div>

    <div id="tableWrapper" class="table-wrapper">
      <table class="metrics-table">
        <thead>
        <tr>
          <th>Env</th>
          <th>Host</th>
          <th>Type</th>
          <th>Executed Action / Route</th>
          <th>Latency</th>
          <th>Recorded At</th>
        </tr>
        </thead>
        <tbody id="metricsTableBody">
        </tbody>
      </table>
    </div>

    <div class="pagination-wrapper" style="display: flex; justify-content: center; align-items: center; gap: 15px; marginTop: 20px; padding: 20px 0;">
      <button id="btnBack" onclick="changePage(-1)">Back</button>
      <span id="pageInfo" style="font-weight: bold;">Page 1 of 1</span>
      <button id="btnNext" onclick="changePage(1)">Next</button>
    </div>
  </div>

</div>

<script>
  const BASE_URL = 'http://127.0.0.1:8080/api/v1';
  let token = localStorage.getItem('token') || null;
  let currentPage = 1;
  let totalPages = 1;
  let isActionLoading = false;

  // Ініціалізація стану при завантаженні сторінки
  window.addEventListener('DOMContentLoaded', () => {
    if (token) {
      showPage('dashboardPage');
      fetchMetrics(currentPage);
    } else {
      showPage('loginPage');
    }
  });

  // Маршрутизація сторінок
  function showPage(pageId) {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('dashboardPage').classList.add('hidden');
    document.getElementById(pageId).classList.remove('hidden');
  }

  // Обробка форми логіну
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const loginBtn = document.getElementById('loginBtn');
    loginBtn.disabled = true;
    loginBtn.innerText = 'Downloading...';

    const usernameInput = document.getElementById('username').value;
    const passwordInput = document.getElementById('password').value;

    try {
      const response = await fetch(`${BASE_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: usernameInput, password: passwordInput })
      });

      if (!response.ok) throw new Error('Error while creating login');

      const data = await response.json();
      token = data.token;
      localStorage.setItem('token', token);

      showPage('dashboardPage');
      fetchMetrics(1);
    } catch (error) {
      alert("Error logging in");
    } finally {
      loginBtn.disabled = false;
      loginBtn.innerText = 'Enter';
    }
  });

  // Отримання списку метрик
  async function fetchMetrics(page) {
    const loader = document.getElementById('loader');
    const tableWrapper = document.getElementById('tableWrapper');
    const errorDiv = document.getElementById('errorMessage');

    loader.classList.remove('hidden');
    errorDiv.classList.add('hidden');

    try {
      const response = await fetch(`${BASE_URL}/metrics?page=${page}&size=8`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) throw new Error('Не вдалося завантажити метрики');

      const result = await response.json();
      currentPage = result.currentPage;
      totalPages = result.totalPages || 1;

      renderTable(result.data);
      updatePaginationControls();
    } catch (err) {
      errorDiv.innerText = 'Error fetching server performance metrics';
      errorDiv.classList.remove('hidden');
    } finally {
      loader.classList.add('hidden');
    }
  }

  // Рендеринг рядків таблиці
  function renderTable(metrics) {
    const tbody = document.getElementById('metricsTableBody');
    tbody.innerHTML = '';

    if (!metrics || metrics.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 20px;">No metrics recorded yet</td></tr>`;
      return;
    }

    metrics.forEach(metric => {
      const name = metric.methodName || '';
      const isHttp = name.startsWith('/') || name.includes('validate') || name.includes('load');
      const badge = isHttp ? '<span class="badge latency">HTTP API</span>' : '<span class="badge cpu">DB QUERY</span>';
      const latency = metric.durationNs ? (metric.durationNs / 1000000).toFixed(2) : '0.00';

      // Форматування часу (зберігає чистий рядок з TIMESTAMP WITHOUT TIME ZONE)
      let formattedDate = 'N/A';
      if (metric.recordedAt) {
        formattedDate = typeof metric.recordedAt === 'number'
                ? new Date(metric.recordedAt * (metric.recordedAt < 99999999999 ? 1000 : 1)).toLocaleString()
                : new Date(metric.recordedAt).toLocaleString();
      }

      const row = `
          <tr>
            <td><span class="status-active">${metric.environment}</span></td>
            <td><code>${metric.hostName}</code></td>
            <td>${badge}</td>
            <td><strong>${name}</strong></td>
            <td><span style="color: var(--accent-yellow); font-weight: bold;">${latency} ms</span></td>
            <td>${formattedDate}</td>
          </tr>
        `;
      tbody.innerHTML += row;
    });
  }

  // Обробка кнопок дій (Validate / Load data)
  async function triggerAction(endpoint, buttonId, defaultText) {
    if (isActionLoading) return;

    isActionLoading = true;
    setGlobalButtonsState(true);
    document.getElementById(buttonId).innerText = 'Executing...';

    try {
      const response = await fetch(`${BASE_URL}/${endpoint}`, {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!response.ok) throw new Error();
      await fetchMetrics(1); // Скидаємо на 1 сторінку
    } catch (err) {
      alert(`Failed to trigger ${endpoint}`);
    } finally {
      isActionLoading = false;
      setGlobalButtonsState(false);
      document.getElementById(buttonId).innerText = defaultText;
    }
  }

  // Керування пагінацією
  function changePage(direction) {
    const targetPage = currentPage + direction;
    if (targetPage >= 1 && targetPage <= totalPages) {
      fetchMetrics(targetPage);
    }
  }

  function updatePaginationControls() {
    document.getElementById('pageInfo').innerText = `Page ${currentPage} of ${totalPages}`;
    document.getElementById('btnBack').disabled = currentPage === 1 || isActionLoading;
    document.getElementById('btnNext').disabled = currentPage === totalPages || totalPages === 0 || isActionLoading;
  }

  function setGlobalButtonsState(disabled) {
    document.getElementById('btnValidate').disabled = disabled;
    document.getElementById('btnLoad').disabled = disabled;
    document.getElementById('btnBack').disabled = disabled || currentPage === 1;
    document.getElementById('btnNext').disabled = disabled || currentPage === totalPages;
  }

  // Вихід з системи
  function handleLogout() {
    localStorage.removeItem('token');
    token = null;
    showPage('loginPage');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
  }
</script>
</body>
</html>
